<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, Helvetica, sans-serif;
        }
      
        body {
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #f4f7fb;
          padding: 10px;
        }
      
        .chat-card {
          width: 100%;
          max-width: 520px;
          height: 90vh;
          background: white;
          padding: 16px;
          border-radius: 16px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
          display: flex;
          flex-direction: column;
        }
      
        h1 {
          font-size: 22px;
          margin-bottom: 12px;
          color: #222;
        }
      
        /* messages area */
        #messages {
          flex: 1;
          overflow-y: auto;
          padding: 12px;
          background: #f9fafb;
          border-radius: 12px;
          display: flex;
          flex-direction: column;
          gap: 10px;
      
          /* smooth scroll */
          scroll-behavior: smooth;
        }
      
        /* message bubble */
        .message {
          max-width: 80%;
          padding: 10px 14px;
          border-radius: 14px;
          font-size: 14px;
          line-height: 1.4;
          word-wrap: break-word;
          animation: fadeIn 0.2s ease-in;
        }
      
        /* sent (right side) */
        .message.sent {
          align-self: flex-end;
          background: #4f46e5;
          color: white;
          border-bottom-right-radius: 4px;
        }
      
        /* received (left side) */
        .message.received {
          align-self: flex-start;
          background: #e5e7eb;
          color: #111827;
          border-bottom-left-radius: 4px;
        }
      
        /* input area */
        form {
          margin-top: 10px;
        }
      
        .container {
          display: flex;
          gap: 8px;
        }
      
        .container input {
          flex: 1;
          height: 44px;
          border: 1px solid #d0d7e2;
          border-radius: 10px;
          padding: 0 12px;
          font-size: 14px;
          outline: none;
          transition: 0.2s ease;
        }
      
        .container input:focus {
          border-color: #4f46e5;
          box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
      
        button {
          height: 44px;
          padding: 0 16px;
          border: none;
          border-radius: 10px;
          background: #4f46e5;
          color: white;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: 0.2s ease;
        }
      
        button:hover {
          background: #4338ca;
        }
      
        button:active {
          transform: scale(0.98);
        }
      
        /* mobile responsiveness */
        @media (max-width: 480px) {
          body {
            padding: 0;
          }
      
          .chat-card {
            height: 100vh;
            border-radius: 0;
            padding: 12px;
          }
      
          h1 {
            font-size: 18px;
          }
      
          .message {
            font-size: 13px;
            max-width: 85%;
          }
        }
      
        /* message animation */
        @keyframes fadeIn {
          from {
            opacity: 0;
            transform: translateY(4px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      </style>
  </head>

  <body>
    <div class="chat-card">
      <h1>Chat App</h1>

      <form id="chatForm">
        <div class="container">
          <input type="text" id="msgInput" placeholder="Enter your message" />
          <button type="submit">Send</button>
        </div>
      </form>

      <div id="messages"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const msgInput = document.getElementById("msgInput");
      const messages = document.getElementById("messages");
      const form = document.getElementById("chatForm");

      // SEND MESSAGE
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const message = msgInput.value.trim();
        if (!message) return;

        // show instantly as SENT
        addMessage(message, true);

        socket.emit("user-message", { message });

        msgInput.value = "";
      });

      // RECEIVE MESSAGE
      socket.on("message", (data) => {
        const { message } = data;

        // received messages (others)
        addMessage(message, false);
      });

      // helper function
      function addMessage(text, isSender) {
        const div = document.createElement("div");
        div.classList.add("message");

        div.classList.add(isSender ? "sent" : "received");
        div.innerText = text;

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
    </script>
  </body>
</html>
